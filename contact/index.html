<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact｜KAKUO AI株式会社</title><meta name="description" content="KAKUO AI株式会社へのお問い合わせページです。建築・インテリア・不動産開発・メーカー提案のAIビジュアル制作についてご相談ください。"><meta property="og:title" content="Contact | KAKUO AI"><meta property="og:description" content="建築・インテリア・不動産開発・メーカー提案のAIビジュアル制作についてご相談ください。"><meta property="og:type" content="website"><meta property="og:image" content="https://storage.googleapis.com/studio-design-asset-files/projects/BVqXj1jPWR/s-780x439_v-fs_webp_c3496fbe-ae4a-41ad-a8c0-3bad8cd451c0.jpg"><meta name="twitter:card" content="summary_large_image"><link rel="icon" href="../favicon.svg" type="image/svg+xml"><style>:root{--black:#0e0e0e;--white:#f5f1ea;--gold:#b8a06a;--muted:rgba(245,241,234,.68)}*{box-sizing:border-box}html,body{width:100%;min-height:100%;margin:0;overflow-x:hidden;overflow-y:auto}body{font-family:Inter,"Helvetica Neue","Noto Sans JP",Arial,sans-serif;color:var(--white);background:var(--black);-webkit-overflow-scrolling:touch;touch-action:pan-y}a{color:inherit;text-decoration:none}.header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;height:72px;padding:0 clamp(20px,4vw,56px);background:rgba(14,14,14,.92);border-bottom:1px solid rgba(245,241,234,.12)}.brand{font-size:15px;font-weight:700}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 20px;border:1px solid var(--white);background:var(--white);color:var(--black);font-size:14px;font-weight:700}main{width:100%;min-height:calc(100svh - 72px);height:auto;overflow:visible;padding:clamp(42px,6vw,84px)}.hero{display:grid;grid-template-columns:.9fr 1.1fr;gap:clamp(36px,6vw,84px);align-items:start}.eyebrow{margin:0 0 18px;color:var(--gold);font-size:12px;font-weight:800;text-transform:uppercase}h1,p{margin:0}h1{max-width:680px;font-size:clamp(38px,5vw,72px);line-height:1.05}.lead{margin-top:18px;max-width:620px;color:var(--muted);font-size:15px;line-height:1.9}.form{display:grid;gap:12px;padding:24px;background:rgba(245,241,234,.06);border:1px solid rgba(245,241,234,.14)}label{display:grid;gap:7px;color:rgba(245,241,234,.72);font-size:12px;font-weight:700}input,select,textarea{width:100%;min-height:42px;border:1px solid rgba(245,241,234,.18);background:rgba(14,14,14,.7);color:var(--white);padding:9px 12px;font:inherit}textarea{min-height:120px;resize:vertical}.note{color:rgba(245,241,234,.55);font-size:11px;line-height:1.6}.submit{border:0;min-height:50px;background:var(--gold);color:var(--black);font:inherit;font-weight:800;cursor:pointer}@media(max-width:760px){.header{height:62px}main{min-height:calc(100svh - 62px);padding:42px 20px 56px}.hero{grid-template-columns:1fr}}</style></head><body><header class="header"><a class="brand" href="../">KAKUO AI</a><a class="btn" href="../">TOPへ戻る</a></header><main><section class="hero"><div><p class="eyebrow">Contact</p><h1>構想段階のプロジェクトを、まずはAIで可視化しませんか。</h1><p class="lead">図面、敷地情報、参考イメージ、企画書のいずれかがあれば、初期提案の方向性を整理できます。建築・インテリア・不動産開発・メーカー提案まで、お気軽にご相談ください。</p></div><form class="form"><label>お名前<input type="text" name="name"></label><label>会社名<input type="text" name="company"></label><label>メールアドレス<input type="email" name="email"></label><label>電話番号<input type="tel" name="tel"></label><label>ご相談内容<select name="category"><option>AI建築デザイン提案</option><option>AIインテリア提案</option><option>AIランドスケープ提案</option><option>不動産・再開発提案</option><option>建材・プロダクト提案</option><option>AI導入支援</option><option>その他</option></select></label><label>お問い合わせ内容<textarea name="message"></textarea></label><p class="note">このページは公開プレビューです。実運用時はフォーム送信先をSTUDIOまたは外部フォームで設定してください。</p><button class="submit" type="button">送信内容を確認する</button></form></section></main></body></html>
